# DHCP config for second Starlink WAN emulation (inside netns)
# Interface facing router WAN port 2
interface=enxd03745fef729
bind-interfaces
except-interface=lo

# Different subnet from WAN1 (100.127.0.x)
dhcp-range=100.127.1.10,100.127.1.200,255.255.255.0,12h
dhcp-option=option:router,100.127.1.1
dhcp-option=option:dns-server,100.127.1.1

# Push static route so router knows 192.168.100.0/24 is reachable via this host.
dhcp-option=option:classless-static-route,192.168.100.0/24,100.127.1.1,0.0.0.0/0,100.127.1.1

# DNS forwarder
no-resolv
server=1.1.1.1
server=8.8.8.8

# Optional static answers for WAN health checks
address=/connectivitycheck.gstatic.com/142.250.72.99
address=/www.msftconnecttest.com/13.107.4.52
address=/dns.msftncsi.com/131.107.255.255

dhcp-authoritative
log-dhcp
log-queries
