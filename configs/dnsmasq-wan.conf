# DHCP config for router WAN emulation
# Interface facing router WAN
interface=enx00051bcde7ed
bind-interfaces
except-interface=lo

# Offer a CGNAT-like subnet often seen in ISP/Starlink contexts
# Router WAN will usually get 100.127.0.10
# You can change the pool and lease time as needed.
dhcp-range=100.127.0.10,100.127.0.200,255.255.255.0,12h
dhcp-option=option:router,100.127.0.1
dhcp-option=option:dns-server,100.127.0.1

# Push a static route so router knows 192.168.100.0/24 is reachable via this host.
# This lets the router reach the Starlink dish management IP (192.168.100.1:9200).
dhcp-option=option:classless-static-route,192.168.100.0/24,100.127.0.1,0.0.0.0/0,100.127.0.1

# Run as a local DNS forwarder for router WAN health checks.
no-resolv
server=1.1.1.1
server=8.8.8.8

# Optional static answers used by some WAN health checks.
address=/connectivitycheck.gstatic.com/142.250.72.99
address=/www.msftconnecttest.com/13.107.4.52
address=/dns.msftncsi.com/131.107.255.255

dhcp-authoritative
log-dhcp
log-queries
