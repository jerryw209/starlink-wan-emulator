syntax = "proto3";

package SpaceX.API.Device;

import "spacex/api/device/common.proto";

message DishStowRequest {
	optional bool unstow = 1;
}

message DishStowResponse {}

message DishGetContextRequest {}

message DishGetContextResponse {
	optional DeviceInfo device_info = 1;
	optional DeviceState device_state = 7;
	optional float obstruction_fraction = 2;
	optional float obstruction_valid_s = 3;
	optional uint32 cell_id = 4;
	optional uint32 pop_rack_id = 5;
	optional uint32 initial_satellite_id = 8;
	optional uint32 initial_gateway_id = 9;
	optional bool on_backup_beam = 10;
	optional float seconds_to_slot_end = 6;
}

message DishGetHistoryResponse {
	optional uint64 current = 1;
	repeated float pop_ping_drop_rate = 1001;
	repeated float pop_ping_latency_ms = 1002;
	repeated float downlink_throughput_bps = 1003;
	repeated float uplink_throughput_bps = 1004;
	repeated float snr = 1005;
	repeated bool scheduled = 1006;
	repeated bool obstructed = 1007;
}

message DishGetStatusResponse {
	optional DeviceInfo device_info = 1;
	optional DeviceState device_state = 2;
	optional DishState state = 1006;
	optional DishAlerts alerts = 1005;
	optional float snr = 1001;
	optional float seconds_to_first_nonempty_slot = 1002;
	optional float pop_ping_drop_rate = 1003;
	optional float downlink_throughput_bps = 1007;
	optional float uplink_throughput_bps = 1008;
	optional float pop_ping_latency_ms = 1009;
	optional DishObstructionStats obstruction_stats = 1004;
	optional bool stow_requested = 1010;
	optional DisablementCode disablement_code = 1011;
	optional DishOutage outage = 1014;
	optional BandwidthRestrictedReason dl_bandwidth_restricted_reason = 1026;
	optional BandwidthRestrictedReason ul_bandwidth_restricted_reason = 1027;
}

message DishGetObstructionMapRequest {}

message DishGetObstructionMapResponse {
	optional uint32 num_rows = 1;
	optional uint32 num_cols = 2;
	repeated float snr = 3;
}

message DishAlerts {
	optional bool motors_stuck = 1;
	optional bool thermal_throttle = 3;
	optional bool thermal_shutdown = 2;
	optional bool mast_not_near_vertical = 5;
	optional bool unexpected_location = 4;
	optional bool slow_ethernet_speeds = 6;
}

message DishObstructionStats {
	optional bool currently_obstructed = 5;
	optional float fraction_obstructed = 1;
	optional float last_24h_obstructed_s = 1006;
	optional float valid_s = 4;
	repeated float wedge_fraction_obstructed = 2;
	repeated float wedge_abs_fraction_obstructed = 3;
}

message DishAuthenticateResponse {
	optional ChallengeResponse dish = 2;
}

enum DishState {
	UNKNOWN = 0;
	CONNECTED = 1;
	SEARCHING = 2;
	BOOTING = 3;
	STOWED = 4;
	THERMAL_SHUTDOWN = 5;
	NO_SATS = 6;
	OBSTRUCTED = 7;
	NO_DOWNLINK = 8;
	NO_PINGS = 9;
	DISABLED = 10;
}

enum DisablementCode {
	DISABLEMENT_UNKNOWN = 0;
	DISABLEMENT_OKAY = 1;
	NO_ACTIVE_ACCOUNT = 2;
	TOO_FAR_FROM_SERVICE_ADDRESS = 3;
	IN_OCEAN = 4;
	// 5 was INVALID_COUNTRY (removed)
	BLOCKED_COUNTRY = 6;
	DATA_OVERAGE_SANDBOX_POLICY = 7;
	CELL_IS_DISABLED = 8;
	// 9 was UNLICENSED_COUNTRY (removed)
	ROAM_RESTRICTED = 10;
	UNKNOWN_LOCATION = 11;
	ACCOUNT_DISABLED = 12;
	UNSUPPORTED_VERSION = 13;
	MOVING_TOO_FAST_FOR_POLICY = 14;
	UNDER_AVIATION_FLYOVER_LIMITS = 15;
	BLOCKED_AREA = 16;

	reserved 5, 9;
	reserved "INVALID_COUNTRY", "UNLICENSED_COUNTRY";
}

enum BandwidthRestrictedReason {
	UNKNOWN_BANDWIDTH_REASON = 0;
	NO_LIMIT = 1;
	POLICY_LIMIT = 2;
	USER_CUSTOM_LIMIT = 3;
	OVERAGE_LIMIT = 4;
}

message DishOutage {
	enum Cause {
		UNKNOWN = 0;
		BOOTING = 1;
		STOWED = 2;
		THERMAL_SHUTDOWN = 3;
		NO_SCHEDULE = 4;
		NO_SATS = 5;
		OBSTRUCTED = 6;
		NO_DOWNLINK = 7;
		NO_PINGS = 8;
		ACTUATOR_ACTIVITY = 9;
		CABLE_TEST = 10;
		SLEEPING = 11;
		MOVING_WHILE_NOT_ALLOWED = 12;
	}
	optional Cause cause = 1;
	optional int64 start_timestamp_ns = 2;
	optional uint64 duration_ns = 3;
	optional bool did_switch = 4;
}
